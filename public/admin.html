<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панель - Арт Периметр</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        .hidden { display: none !important; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 25px; color: #2e7d32; font-size: 1.8rem; }
        h2 { margin-bottom: 20px; font-size: 1.3rem; color: #333; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab { padding: 12px 24px; background: #eee; border-radius: 8px; cursor: pointer; font-weight: 600; border: 0; }
        .tab.active { background: #2e7d32; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.875rem; color: #555; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2e7d32; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }

        .btn-save { background: #2e7d32; color: white; width: 100%; padding: 18px; font-size: 1.1rem; margin-top: 20px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-save:hover { background: #1b5e20; }
        .btn-back { background: #2196f3; color: white; margin-bottom: 20px; text-decoration: none; display: inline-block; padding: 10px 18px; border-radius: 6px; }
        .btn-logout { background: #f44336; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; }

        .leads-list { max-height: 500px; overflow-y: auto; }
        .lead-item { padding: 20px; background: #f9f9f9; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #2e7d32; }
        .lead-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }
        .lead-phone { color: #2e7d32; font-weight: 600; margin-bottom: 8px; }
        .lead-date { font-size: 0.8rem; color: #666; }
        .filter-btn.active { background: #2e7d32 !important; color: white !important; border-color: #2e7d32 !important; }

        .login-form { max-width: 400px; margin: 100px auto; text-align: center; }
        .login-form input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .login-form button { width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }

        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container" id="admin-app">
        <div id="login-screen" class="login-form">
            <h1>🔐 Вход в админку</h1>
            <input type="password" id="admin-pass" placeholder="Введите пароль">
            <button onclick="Admin.login()">Войти</button>
            <p style="margin-top:20px;color:#666;font-size:0.875rem;">
                <a href="index.html">← Вернуться на сайт</a>
            </p>
        </div>

        <div id="dashboard" class="hidden">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <h1>🔧 Админ Панель</h1>
                <button class="btn-logout" onclick="Admin.logout()">Выйти</button>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="content">✏️ Контент</button>
                <button class="tab" data-tab="leads">📩 Заявки</button>
            </div>

            <div id="content-tab" class="tab-content active">
                <div class="card">
                    <h2>🌐 Общие настройки</h2>
                    <div class="form-row">
                        <div class="form-group"><label>Название компании</label><input type="text" id="edit-company"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="edit-email"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Телефон 1</label><input type="text" id="edit-phone1"></div>
                        <div class="form-group"><label>Телефон 2</label><input type="text" id="edit-phone2"></div>
                    </div>
                    <div class="form-group"><label>Адрес</label><input type="text" id="edit-address"></div>
                    <div class="form-group"><label>Часы работы</label><input type="text" id="edit-hours"></div>
                </div>

                <div class="card">
                    <h2>🎨 Hero секция</h2>
                    <div class="form-group"><label>Надзаголовок</label><input type="text" id="edit-hero-subtitle"></div>
                    <div class="form-group"><label>Заголовок</label><textarea id="edit-hero-title" rows="2"></textarea></div>
                    <div class="form-group"><label>Описание</label><textarea id="edit-hero-desc" rows="2"></textarea></div>
                    <div class="form-group"><label>Текст кнопки</label><input type="text" id="edit-hero-cta"></div>
                    <div class="form-group"><label>Фон (URL)</label><input type="text" id="edit-hero-bg"></div>
                </div>

                <div class="card">
                    <h2>🧮 Калькулятор</h2>
                    <div class="form-group"><label>Заголовок</label><input type="text" id="edit-calc-title"></div>
                    <div class="form-group"><label>Подзаголовок</label><input type="text" id="edit-calc-subtitle"></div>
                </div>

                <div class="card">
                    <h2>🛠️ Услуги</h2>
                    <div class="form-group"><label>Заголовок</label><input type="text" id="edit-services-title"></div>
                    <div class="form-group"><label>Описание</label><textarea id="edit-services-desc" rows="2"></textarea></div>
                </div>

                <div class="card">
                    <h2>📞 Контакты</h2>
                    <div class="form-group"><label>Заголовок</label><input type="text" id="edit-contacts-title"></div>
                    <div class="form-group"><label>Описание</label><textarea id="edit-contacts-desc" rows="2"></textarea></div>
                </div>

                <div class="card">
                    <h2>⚓ Подвал</h2>
                    <div class="form-group"><label>Текст копирайта</label><input type="text" id="edit-footer"></div>
                </div>

                <button class="btn-save" onclick="Admin.saveContent()">💾 Сохранить изменения</button>
                <a href="index.html" target="_blank" class="btn-back" style="display:inline-block;margin-top:15px;">🌐 Открыть сайт</a>
            </div>

            <div id="leads-tab" class="tab-content">
                <div class="card">
                    <h2>📊 Статистика</h2>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:15px;margin-bottom:25px;">
                        <div style="background:#e8f5e9;padding:15px;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;font-weight:bold;color:#2e7d32;" id="stat-total">0</div><div style="font-size:0.8rem;color:#666;">Всего</div></div>
                        <div style="background:#fff3e0;padding:15px;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;font-weight:bold;color:#e65100;" id="stat-new">0</div><div style="font-size:0.8rem;color:#666;">Новые</div></div>
                        <div style="background:#e3f2fd;padding:15px;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;font-weight:bold;color:#1565c0;" id="stat-progress">0</div><div style="font-size:0.8rem;color:#666;">В работе</div></div>
                        <div style="background:#e8f5e9;padding:15px;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;font-weight:bold;color:#2e7d32;" id="stat-completed">0</div><div style="font-size:0.8rem;color:#666;">Выполнены</div></div>
                        <div style="background:#fce4ec;padding:15px;border-radius:8px;text-align:center;"><div style="font-size:1.5rem;font-weight:bold;#ad1457;" id="stat-24h">0</div><div style="font-size:0.8rem;color:#666;">За 24ч</div></div>
                    </div>
                </div>
                <div class="card">
                    <h2>📩 Заявки <span id="leads-count" style="color:#666;font-weight:normal;font-size:0.9rem;">0</span></h2>
                    <div style="margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="filter-btn active" data-status="all" onclick="Admin.setFilter('all')" style="padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#2e7d32;color:white;border-color:#2e7d32;">Все</button>
                        <button class="filter-btn" data-status="new" onclick="Admin.setFilter('new')" style="padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;">🆕 Новые</button>
                        <button class="filter-btn" data-status="in_progress" onclick="Admin.setFilter('in_progress')" style="padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;">🔄 В работе</button>
                        <button class="filter-btn" data-status="completed" onclick="Admin.setFilter('completed')" style="padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;">✅ Выполнены</button>
                        <button class="filter-btn" data-status="rejected" onclick="Admin.setFilter('rejected')" style="padding:8px 16px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;">❌ Отклонены</button>
                    </div>
                    <div id="leads-list" class="leads-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>

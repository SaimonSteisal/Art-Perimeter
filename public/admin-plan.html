<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План Разработки - Арт Периметр</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f4f4; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 25px; color: #2e7d32; font-size: 1.8rem; }
        h2 { margin-bottom: 15px; font-size: 1.3rem; color: #333; border-bottom: 2px solid #2e7d32; padding-bottom: 8px; }
        
        .btn-back { background: #2196f3; color: white; text-decoration: none; display: inline-block; padding: 10px 18px; border-radius: 6px; margin-bottom: 20px; }
        .btn-back:hover { background: #1976d2; }
        
        .phase { margin-bottom: 25px; padding: 15px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #2e7d32; }
        .phase-title { font-weight: 700; color: #2e7d32; margin-bottom: 10px; font-size: 1.1rem; }
        .task { padding: 5px 0; font-size: 0.9rem; }
        .task-done { color: #666; }
        .task-done::before { content: '✅ '; }
        .task-pending { color: #999; }
        .task-pending::before { content: '⬜ '; }
        
        .plan-content { white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 0.85rem; background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-x: auto; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #eee; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; }
        .tab.active { background: #2e7d32; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        @media (max-width: 768px) {
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/admin" class="btn-back">← Назад в админку</a>
        <h1>📋 План Разработки (PLAN.md)</h1>
        
        <div class="tabs">
            <button type="button" class="tab active" data-tab="rendered">📖 Отформатированный</button>
            <button type="button" class="tab" data-tab="raw">📄 Исходный текст</button>
        </div>
        
        <div id="rendered-tab" class="tab-content active">
            <div id="plan-rendered" class="card"></div>
        </div>
        
        <div id="raw-tab" class="tab-content">
            <pre id="plan-raw" class="plan-content"></pre>
        </div>
    </div>
    
    <script>
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
            });
        });
        
        // Load PLAN.md dynamically
        fetch('/PLAN.md')
            .then(res => res.text())
            .then(text => {
                document.getElementById('plan-raw').textContent = text;
                renderPlan(text);
            })
            .catch(err => {
                console.error('Ошибка загрузки плана:', err);
                document.getElementById('plan-rendered').innerHTML = '<p style="color:red;">Ошибка загрузки PLAN.md</p>';
                document.getElementById('plan-raw').textContent = 'Ошибка загрузки файла';
            });
        
        function renderPlan(markdown) {
            const container = document.getElementById('plan-rendered');
            const lines = markdown.split('\n');
            let html = '';
            
            lines.forEach(line => {
                if (line.startsWith('# ')) {
                    html += `<h2>${escapeHtml(line.substring(2))}</h2>`;
                } else if (line.startsWith('## ')) {
                    html += `<div class="phase"><div class="phase-title">${escapeHtml(line.substring(3))}</div>`;
                } else if (line.startsWith(' * ')) {
                    const taskText = line.substring(3);
                    const isDone = taskText.includes('[x]');
                    const className = isDone ? 'task-done' : 'task-pending';
                    html += `<div class="${className}">${escapeHtml(taskText)}</div>`;
                } else if (line === '') {
                    html += '</div>';
                } else if (line.trim() && !line.startsWith('#')) {
                    html += `<div class="task">${escapeHtml(line)}</div>`;
                }
            });
            
            container.innerHTML = html || '<p>План пуст</p>';
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

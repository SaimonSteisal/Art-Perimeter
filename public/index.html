<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Изготовление и монтаж заборов, навесов, ворот в Москве и МО">
    <title data-db="site_title">Арт Периметр — Металлоконструкции</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9df898",
                        "primary-dim": "#90e98b",
                        "primary-container": "#5db35c",
                        "on-primary": "#006016",
                        "on-primary-container": "#002a05",
                        "secondary": "#86faac",
                        "secondary-dim": "#78eb9f",
                        "surface": "#0e0e0e",
                        "surface-container": "#1a1919",
                        "surface-container-low": "#131313",
                        "surface-container-high": "#201f1f",
                        "surface-container-highest": "#262626",
                        "surface-bright": "#2c2c2c",
                        "on-surface": "#ffffff",
                        "on-surface-variant": "#adaaaa",
                        "outline": "#777575",
                        "outline-variant": "#494847",
                        "tertiary": "#8ff2ff",
                        "tertiary-container": "#11eafe",
                        "error": "#ff7351",
                        "error-container": "#b92902",
                        "background": "#0e0e0e",
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    fontFamily: {
                        "space": ["Space Grotesk", "sans-serif"],
                        "body": ["Manrope", "sans-serif"],
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #0e0e0e; color: #ffffff; }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .primary-gradient { background: linear-gradient(135deg, #9df898 0%, #5db35c 100%); }
        .text-shadow-glow { text-shadow: 0 0 20px rgba(157, 248, 152, 0.3); }
        .glass-nav { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .section-fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
        .section-fade-in.visible { opacity: 1; transform: translateY(0); }
        .mobile-menu { position: fixed; top: 0; right: 0; height: 100vh; width: 280px; z-index: 200; transform: translateX(100%); transition: transform 0.3s ease; }
        .mobile-menu.open { transform: translateX(0); }
        .hidden { display: none !important; }
        .toast {
            position: fixed; bottom: 24px; right: 24px; z-index: 9999;
            padding: 14px 24px; border-radius: 8px; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s; transform: translateY(20px); opacity: 0;
        }
        .toast.success { background: #9df898; color: #000; }
        .toast.error { background: #b92902; color: #fff; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body class="selection:bg-primary selection:text-on-primary-container">
    <a href="tel:+79175097997" class="fixed right-4 bottom-4 z-50 w-14 h-14 rounded-full primary-gradient grid place-items-center text-2xl shadow-lg md:hidden" aria-label="Позвонить">📞</a>

    <header id="header"></header>
    <main id="app-container"></main>
    <footer id="footer"></footer>

    <div id="toast" class="toast">
        <span id="toast-message"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
